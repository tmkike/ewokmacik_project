<section class="mod-page">
  <div class="mod-card">
    <h1>Könyvek módosítása és törlése</h1>

    <p class="status" *ngIf="loading">Könyvek betöltése...</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <table *ngIf="!loading && books.length > 0">
      <thead>
        <tr>
          <th>Cím</th>
          <th>Szerző</th>
          <th>Elérhető</th>
          <th>Műveletek</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let book of books">
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.available ? 'Igen' : 'Nem' }}</td>
          <td class="actions">
            <button type="button" (click)="selectBook(book)">Szerkesztés</button>
            <button type="button" (click)="toggleAvailability(book)">
              {{ book.available ? 'Nem elérhető' : 'Elérhető' }}
            </button>
            <button type="button" class="danger" (click)="deleteBook(book)">Törlés</button>
          </td>
        </tr>
      </tbody>
    </table>

    <p class="status" *ngIf="!loading && books.length === 0">Nincs módosítandó könyv.</p>

    <form *ngIf="selectedBook" class="edit-form" (ngSubmit)="saveBook()" #editForm="ngForm">
      <h2>Kiválasztott könyv szerkesztése</h2>

      <label>
        Cím
        <input type="text" name="title" required [(ngModel)]="selectedBook.title" />
      </label>

      <label>
        Szerző
        <input type="text" name="author" required [(ngModel)]="selectedBook.author" />
      </label>

      <label>
        Kiadás éve
        <input type="number" name="year" required min="0" [(ngModel)]="selectedBook.year" />
      </label>

      <label>
        Kategória
        <input type="text" name="genre" required [(ngModel)]="selectedBook.genre" />
      </label>

      <label class="checkbox-row">
        <input type="checkbox" name="available" [(ngModel)]="selectedBook.available" />
        Elérhető
      </label>

      <button type="submit" [disabled]="editForm.invalid || saving">
        {{ saving ? 'Mentés...' : 'Mentés' }}
      </button>
    </form>
  </div>
</section>

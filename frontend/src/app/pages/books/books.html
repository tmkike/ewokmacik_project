<section class="books-page">
  <div class="books-card">
    <div class="page-header">
      <div>
        <h1>Könyvek listája</h1>
        <p class="intro">Kattints egy könyvre a szerkesztéshez vagy törléshez.</p>
      </div>

      <a class="add-button" routerLink="/add">Új könyv hozzáadása</a>
    </div>

    <form
      class="filters"
      autocomplete="off"
      novalidate
      role="search"
      [formGroup]="filterForm"
      (ngSubmit)="searchBooks()"
    >
      <label>
        Cím
        <input
          type="text"
          name="bookFilterTitle"
          autocomplete="off"
          placeholder="Cím"
          formControlName="title"
        />
      </label>

      <label>
        Szerző
        <input
          type="text"
          name="bookFilterAuthor"
          autocomplete="off"
          placeholder="Szerző"
          formControlName="author"
        />
      </label>

      <label>
        Kategória
        <input
          type="text"
          name="bookFilterGenre"
          autocomplete="off"
          placeholder="Kategória"
          formControlName="genre"
        />
      </label>

      <label>
        Elérhetőség
        <select
          name="bookFilterAvailability"
          formControlName="available"
        >
          <option [ngValue]="null">Mind</option>
          <option [ngValue]="true">Elérhető</option>
          <option [ngValue]="false">Nem elérhető</option>
        </select>
      </label>

      <div class="filter-actions">
        <button type="submit" class="filter-button" [disabled]="loading">
          {{ loading ? 'Keresés...' : 'Keresés' }}
        </button>
        <button type="button" class="filter-button secondary" [disabled]="loading" (click)="clearFilters()">
          Szűrők törlése
        </button>
      </div>
    </form>

    <div
      *ngIf="successMessage && successMessageVisible"
      class="system-message system-message--success"
      role="status"
      aria-live="polite"
    >
      <strong>Sikeres művelet:</strong> {{ successMessage }}
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <ul class="book-list" *ngIf="!loading && books.length > 0" aria-label="Könyvek">
      <li *ngFor="let book of books">
        <button type="button" class="book-list-item" (click)="openBook(book)">
          <span class="book-title">{{ book.title }}</span>
          <span class="book-meta">{{ book.author }} - {{ book.year }} - {{ book.genre }}</span>
          <span [class]="getBookAvailabilityClass(book)">{{ getBookAvailabilityLabel(book) }}</span>
        </button>
      </li>
    </ul>

    <p class="status" *ngIf="!loading && books.length === 0 && !errorMessage">
      Nincs megjeleníthető könyv.
    </p>
  </div>
</section>

<section class="book-detail-page">
  <div class="book-detail-card">
    <button
      type="button"
      class="back-link"
      [disabled]="saving"
      (click)="goBackToBooks()"
    >
      Vissza a könyvekhez
    </button>

    <p class="status" *ngIf="loading">Könyv betöltése...</p>
    <p class="status" *ngIf="saving">Mentés folyamatban...</p>
    <p class="status" *ngIf="bookId && !book && !loading && !errorMessage">
      Nincs betöltött könyv ehhez az azonosítóhoz: {{ bookId }}
    </p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <form *ngIf="book" class="edit-form" (ngSubmit)="saveBook()" #editForm="ngForm">
      <h1>{{ book.title }}</h1>

      <fieldset class="edit-fieldset" [disabled]="saving">
        <label>
          <span class="label-text">Cím <span class="required-marker">*</span></span>
          <input type="text" name="title" required [(ngModel)]="book.title" />
        </label>

        <label>
          <span class="label-text">Szerző <span class="required-marker">*</span></span>
          <input type="text" name="author" required [(ngModel)]="book.author" />
        </label>

        <label>
          <span class="label-text">Kiadás éve <span class="required-marker">*</span></span>
          <input type="number" name="year" required min="0" [(ngModel)]="book.year" />
        </label>

        <label>
          <span class="label-text">Kategória <span class="required-marker">*</span></span>
          <input type="text" name="genre" required [(ngModel)]="book.genre" />
        </label>

        <label class="checkbox-row">
          <input type="checkbox" name="available" [(ngModel)]="book.available" />
          Elérhető
        </label>

        <div class="form-actions">
          <button type="submit" [disabled]="editForm.invalid || saving">
            {{ saving ? 'Mentés...' : 'Mentés' }}
          </button>
          <button type="button" class="danger" [disabled]="saving" (click)="deleteBook()">Törlés</button>
        </div>
      </fieldset>
    </form>
  </div>
</section>

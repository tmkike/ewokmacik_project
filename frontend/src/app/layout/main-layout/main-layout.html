<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-art" aria-hidden="true">
    <div class="book-stack book-stack--left">
      <span class="book-spine book-spine--sea"></span>
      <span class="book-spine book-spine--sky"></span>
      <span class="book-spine book-spine--mint"></span>
    </div>

    <div class="open-book">
      <span class="open-book__page open-book__page--left"></span>
      <span class="open-book__page open-book__page--right"></span>
      <span class="open-book__line open-book__line--one"></span>
      <span class="open-book__line open-book__line--two"></span>
      <span class="open-book__line open-book__line--three"></span>
    </div>

    <div class="book-stack book-stack--right">
      <span class="book-spine book-spine--gold"></span>
      <span class="book-spine book-spine--sea"></span>
      <span class="book-spine book-spine--sky"></span>

    <span class="hero-orbit hero-orbit--one"></span>
    <span class="hero-orbit hero-orbit--two"></span>

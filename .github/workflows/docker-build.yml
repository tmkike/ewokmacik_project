name: Build, Test and Push Container Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and start the library stack
        run: docker compose -f library-system/docker-compose.yml up -d --build

      - name: Wait for services to become healthy
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/health >/dev/null \
              && curl --fail --silent http://localhost:3001/health >/dev/null \
              && curl --fail --silent http://localhost:3002/health >/dev/null; then
              exit 0
            fi

            echo "A szolgáltatások még indulnak, újrapróbálás 10 másodperc múlva..."
            sleep 10
          done

          echo "A szolgáltatások nem álltak fel időben."
          docker compose -f library-system/docker-compose.yml ps
          exit 1

      - name: Run integration tests
        run: dotnet test library-system/tests/LibrarySystem.StackTests/LibrarySystem.StackTests.csproj
        env:
          LIBRARY_BASE_URL: http://localhost:3000

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f library-system/docker-compose.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f library-system/docker-compose.yml down -v --remove-orphans

  build-and-push:
    if: github.event_name != 'pull_request'
    needs: verify-stack
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: frontend
            image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service_name: book-service
            image_suffix: book-service
            context: ./library-system/book-service
            dockerfile: ./library-system/book-service/Dockerfile
          - service_name: loan-service
            image_suffix: loan-service
            context: ./library-system/loan-service
            dockerfile: ./library-system/loan-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.image_suffix }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_name }}

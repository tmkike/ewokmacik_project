services:

  api:
    build:
      context: ./backend
    container_name: library-api
    depends_on:
      - mongodb
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: library
    ports:
      - "3000:3000"

  mongodb:
    image: mongo:8
    container_name: library-mongodb

    ports:
      - "27017:27017"

    volumes:
      - ./database/seed:/docker-entrypoint-initdb.d
